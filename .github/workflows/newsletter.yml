name: newsletter

on:
  schedule:
    - cron: "0 22 * * *" # 매일 07:00 KST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 뉴스레터 발송
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
          # Supabase 구독자 명단 읽기 (service_role 키 — 비공개 시크릿, 직접 설정)
          SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://nvlinrkabmwwkmrytlqr.supabase.co' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python send_newsletter.py
