name: hourly-briefing

on:
  schedule:
    - cron: "5 * * * *" # 매시간 (Actions 스케줄 지연을 감안해 5분에 실행)
  push:
    branches: [main]
  workflow_dispatch: {} # 수동 실행

permissions:
  contents: write # 아카이브 스냅샷 커밋
  issues: write # 실패 시 이슈 자동 생성
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Sentry Cron Monitor (DSN 기반 체크인 — 실패/미실행 시 Sentry가 알림)
  SENTRY_CRON_URL: https://o4511726173159424.ingest.us.sentry.io/api/4511776368689152/cron/hourly-briefing/d80edcd8a1167eecfe0d7ef5bdb37f7c/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sentry check-in (시작)
        run: curl -sf "${SENTRY_CRON_URL}?status=in_progress" > /dev/null || true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - name: Install Korean font (OG 카드 렌더링용)
        run: sudo apt-get install -y --no-install-recommends fonts-nanum
      # AI 요약 캐시 — 변화 없는 클러스터는 재호출하지 않아 시간당 비용 최소화
      - uses: actions/cache@v4
        with:
          path: |
            data/cache.json
            data/community_seen.json
            data/bias_model_state.json
            data/goreun.db
          key: briefing-cache-${{ github.run_id }}
          restore-keys: briefing-cache-
      - name: Unit tests
        run: python -m pytest tests/ -v
      - name: Generate briefing
        run: python run.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 네이버 CLOVA Studio(HyperCLOVA X) 라벨링. CLOVA_API_KEY 시크릿이 있으면
          # LLM_PRIORITY(기본 clova,gemini,claude) 순으로 CLOVA를 1순위로 시도한다.
          CLOVA_API_KEY: ${{ secrets.CLOVA_API_KEY }}
          CLOVA_MODEL: ${{ vars.CLOVA_MODEL }}
          LLM_PRIORITY: ${{ vars.LLM_PRIORITY }}
          # 네이버 뉴스 검색 보강. 변수 ENABLE_NAVER_SEARCH=1 로 켠다.
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ENABLE_NAVER_SEARCH: ${{ vars.ENABLE_NAVER_SEARCH }}
          # LLM 라벨링 스위치. Actions 변수 ENABLE_LLM_LABELING=1 로 켜면 LLM 라벨링,
          # 미설정(빈 값)이면 무-API 알고리즘 모드. 실패 시 자동으로 알고리즘 폴백.
          ENABLE_LLM_LABELING: ${{ vars.ENABLE_LLM_LABELING }}
          BRIEFING_MODEL: ${{ vars.BRIEFING_MODEL }}
          NEWSLETTER_FORM_ACTION: ${{ vars.NEWSLETTER_FORM_ACTION }}
          NEWSLETTER_FORM_ENTRY: ${{ vars.NEWSLETTER_FORM_ENTRY }}
          ADSENSE_CLIENT_ID: ${{ vars.ADSENSE_CLIENT_ID }}
          GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}
      - name: Commit archive snapshot
        run: |
          if [ -n "$(git status --porcelain archive)" ]; then
            git config user.name "goreun-bot"
            git config user.email "actions@github.com"
            git add archive
            git commit -m "archive: $(date -u +%Y-%m-%dT%H:%M)Z snapshot"
            # 빌드가 남긴 archive 외 추적 파일 변경(캐시 DB 등)은 리베이스를 막으므로 되돌린다
            git checkout -- . 2>/dev/null || true
            if ! git pull --rebase -X ours origin main; then
              git rebase --abort
              echo "Rebase failed with conflicts, skipping archive push."
            else
              if ! git push origin main; then
                git pull --rebase -X ours origin main
                git push origin main || echo "아카이브 푸시 재시도 실패 (다음 실행에서 재시도)"
              fi
            fi
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Sentry check-in (성공)
        if: success()
        run: curl -sf "${SENTRY_CRON_URL}?status=ok" > /dev/null || true
      - name: 실패 알림 (Sentry + GitHub 이슈)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sf "${SENTRY_CRON_URL}?status=error" > /dev/null || true
          gh issue create \
            --title "hourly-briefing 실패: run #${{ github.run_number }}" \
            --body "워크플로우 실행이 실패했습니다. 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
